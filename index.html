<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../Assets/reset.css" />
    <link rel="stylesheet" href="../Assets/styles.css" />
    <link
      rel="shortcut icon"
      href="../Assets/img/stars.png"
      type="image/x-icon"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
      integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>hihihaha</title>
  </head>
  <body class="index-layout" style="margin: 0; display: flex; height: 100vh">
    <button
      class="mobile-nav-toggle"
      type="button"
      aria-label="Open navigation"
    >
      <i class="fa-solid fa-democrat" style="font-size: 15px"></i>
    </button>

    <div
      class="nav-frame-wrap"
      style="width: 180px; display: flex; flex-direction: column"
    >
      <iframe
        name="NavBar"
        src="./Navigation/navbar.html"
        style="flex: 1; border: none"
        marginwidth="5"
        marginheight="0"
      ></iframe>
    </div>

    <iframe
      class="client-frame"
      name="Client"
      src="./Navigation/home.html"
      style="flex: 1; border: none"
      marginwidth="20"
      marginheight="20"
      scrolling="yes"
    ></iframe>

    <script>
      const mobileNavButton = document.querySelector(".mobile-nav-toggle");
      const clientFrame = document.querySelector('iframe[name="Client"]');
      const navFrame = document.querySelector('iframe[name="NavBar"]');

      mobileNavButton.addEventListener("click", function () {
        document.body.classList.toggle("nav-open");
      });

      clientFrame.addEventListener("load", function () {
        if (window.innerWidth <= 767) {
          document.body.classList.remove("nav-open");
        }
      });

      navFrame.addEventListener("load", function () {
        try {
          navFrame.contentWindow.document.addEventListener(
            "click",
            function (event) {
              if (event.target.closest("a") && window.innerWidth <= 767) {
                setTimeout(function () {
                  document.body.classList.remove("nav-open");
                }, 150);
              }
            },
          );
        } catch (error) {
          console.log("Cannot access navbar iframe:", error);
        }
      });

      // Script to handle bookmark saving and restoring
      (function () {
        const STORAGE_KEY = "lastPage";
        const clientFrame = document.querySelector('iframe[name="Client"]');

        function saveBookmark(url) {
          localStorage.setItem(STORAGE_KEY, url);
        }

        function restoreBookmark() {
          const lastPage = localStorage.getItem(STORAGE_KEY);
          if (lastPage && clientFrame) {
            clientFrame.src = lastPage;
          }
        }

        window.addEventListener("message", function (event) {
          if (event.data && event.data.type === "updateBookmark") {
            saveBookmark(event.data.url);
          }
        });

        window.addEventListener("load", restoreBookmark);
      })();
    </script>
  </body>
</html>
