    <script>
      // Script to save bookmark when clicking links
      document.addEventListener("click", function (event) {
        const link = event.target.closest("a");
        if (link && link.target === "Client") {
          const url = link.href;
          if (window.parent && window.parent !== window) {
            window.parent.postMessage(
              {
                type: "updateBookmark",
                url: url,
              },
              "*",
            );
          }
        }
      });

      (function () {
        const STORAGE_KEY = "bookFontScale";
        const MIN_SCALE = 0.7;
        const MAX_SCALE = 1.5;
        const STEP = 0.1;
        const display = document.getElementById("font-size-display");
        const decreaseButton = document.getElementById("font-decrease");
        const increaseButton = document.getElementById("font-increase");

        function clamp(value) {
          return Math.min(MAX_SCALE, Math.max(MIN_SCALE, value));
        }

        function getClientFrame() {
          return parent?.frames?.["Client"];
        }

        function applyScale(scale) {
          scale = clamp(scale);
          localStorage.setItem(STORAGE_KEY, scale.toFixed(2));
          display.textContent = `${Math.round(scale * 100)}%`;
          const clientFrame = getClientFrame();
          if (clientFrame?.document?.body) {
            clientFrame.document.body.style.zoom = scale;
          }
        }

        function loadScale() {
          const stored = parseFloat(localStorage.getItem(STORAGE_KEY));
          return Number.isFinite(stored) ? stored : 1;
        }

        function init() {
          let scale = loadScale();
          applyScale(scale);

          decreaseButton.addEventListener("click", function () {
            scale = clamp(scale - STEP);
            applyScale(scale);
          });

          increaseButton.addEventListener("click", function () {
            scale = clamp(scale + STEP);
            applyScale(scale);
          });

          const clientFrameElement =
            parent.document.getElementsByName("Client")[0];
          if (clientFrameElement) {
            clientFrameElement.addEventListener("load", function () {
              applyScale(scale);
            });
          }
        }

        window.addEventListener("load", init);
      })();
    </script>
